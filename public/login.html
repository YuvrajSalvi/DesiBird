<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form>
            <div class="form-group">
                <label for="guest-login">Guest Login</label>
                <button id="guest-login">Login as Guest</button>
            </div>
            <div class="form-group">
                <label for="google-login">Google Login</label>
                <button id="google-login">Login with Google</button>
            </div>
            <div class="form-group">
                <label for="email-login">Email/Password Login</label>
                <input type="email" id="email-login" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button id="submit-login">Login</button>
            </div>
            <div class="terms">
                <input type="checkbox" id="terms-conditions" required>
                <label for="terms-conditions">I agree to the Terms & Conditions</label>
            </div>
        </form>
    </div>
</body>
</html>
