<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Lobby Interface</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f0f0f0; }\n        .container { width: 80%; margin: auto; text-align: center; padding: 20px; }\n        .header { font-size: 24px; margin-bottom: 20px; }\n        .currency { font-size: 18px; margin-bottom: 20px; }\n        .button { display: inline-block; padding: 15px 25px; margin: 10px; font-size: 16px; cursor: pointer; background: #007BFF; color: white; border: none; border-radius: 5px; text-decoration: none; }\n        .button:hover { background: #0056b3; }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">Main Lobby</div>\n        <div class=\"currency\">\n            <span>Gold: <span id=\"gold\">1000</span></span> | \n            <span>Ruby: <span id=\"ruby\">500</span></span>\n        </div>\n        <a href=\"#play\" class=\"button\">Play Game</a>\n        <a href=\"#events\" class=\"button\">Events</a>\n        <a href=\"#luckroyale\" class=\"button\">Luck Royale</a>\n        <a href=\"#store\" class=\"button\">Store</a>\n        <a href=\"#presets\" class=\"button\">Presets</a>\n        <a href=\"#leaderboard\" class=\"button\">Leaderboard</a>\n        <a href=\"#profile\" class=\"button\">Profile</a>\n    </div>\n</body>\n</html>
